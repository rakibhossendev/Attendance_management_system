{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h2 class="text-center mb-4">Edit Student</h2>

<form method="POST" action="{{ url_for('teacher_students.update_student', id=student.id) }}" style="max-width:500px;margin:auto;">

<div class="mb-3">
<label>Name</label>
<input type="text" name="name" class="form-control" value="{{ student.name }}" required>
</div>

<div class="mb-3">
<label>Roll</label>
<input type="text" name="roll" class="form-control" value="{{ student.roll }}" required>
</div>

<button class="btn btn-primary w-100">Update Student</button>

</form>

</div>

{% endblock %}
